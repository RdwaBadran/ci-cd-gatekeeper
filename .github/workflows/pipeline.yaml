name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  linter:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Linter
        run: |
          echo "Running linter checks..."
          echo "Linter passed successfully."

  train:
    name: Train Model (GPU Job)
    runs-on: ubuntu-latest
    needs: linter
    if: >
      always() &&
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Training Job
        id: training
        run: |
          echo "Starting GPU training job..."
          echo "Training completed successfully."

      - name: Upload Error Logs on Failure
        if: failure()
        run: |
          echo "Training failed. Collecting error logs..." > error_logs.txt
          echo "Timestamp: $(date)" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt

      - name: Upload error_logs.txt as Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup Temporary Cloud Volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
